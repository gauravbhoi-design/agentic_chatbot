# =============================================================================
# CI/CD Pipeline: Build, Test & Deploy to GCP Cloud Run
# =============================================================================
# Triggers: Push to main, Pull Requests to main
# GCP Project: project-tai-aiinterviewer
# Service: monday-bi-agent
# Region: asia-south1 (Mumbai)
# =============================================================================

name: 🚀 Build & Deploy to Cloud Run

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # ── GCP Configuration ──
  GCP_PROJECT_ID: project-tai-aiinterviewer
  GCP_REGION: asia-south1
  SERVICE_NAME: monday-bi-agent

  # ── Artifact Registry ──
  AR_REPOSITORY: monday-bi-agent-repo
  IMAGE_NAME: asia-south1-docker.pkg.dev/project-tai-aiinterviewer/monday-bi-agent-repo/monday-bi-agent

# ── Concurrency: Cancel in-progress runs on same branch ──
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Job 1: Lint & Security Checks
  # ═══════════════════════════════════════════════════════════════════════════
  lint-and-security:
    name: 🔍 Lint & Security
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # ── Python Setup & Backend Checks ──
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: 📦 Install Python dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install ruff bandit safety

      - name: 🔎 Ruff Lint (Python)
        run: |
          cd backend
          ruff check . --output-format=github || true

      - name: 🛡️ Bandit Security Scan (Python)
        run: |
          cd backend
          bandit -r . -f json -o ../bandit-report.json --severity-level medium || true
          bandit -r . --severity-level high || true

      - name: 🔒 Safety Dependency Check
        run: |
          cd backend
          pip freeze | safety check --stdin || true
        continue-on-error: true

      # ── Node.js Setup & Frontend Checks ──
      - name: 📗 Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install Frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: 🔎 Frontend Build Check
        run: |
          cd frontend
          npm run build

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 2: Build & Push Docker Image
  # ═══════════════════════════════════════════════════════════════════════════
  build-and-push:
    name: 🐳 Build & Push Image
    runs-on: ubuntu-latest
    needs: lint-and-security
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20

    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # ── Authenticate to GCP via Workload Identity Federation ──
      # REQUIRED SECRETS:
      #   GCP_WORKLOAD_IDENTITY_PROVIDER - format: projects/<project-number>/locations/global/workloadIdentityPools/<pool-id>/providers/<provider-id>
      #   GCP_SERVICE_ACCOUNT - format: <sa-name>@project-tai-aiinterviewer.iam.gserviceaccount.com
      - name: 🔐 Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: ☁️ Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      # ── Configure Docker for Artifact Registry ──
      - name: 🐳 Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      # ── Create Artifact Registry repo if it doesn't exist ──
      - name: 📦 Ensure Artifact Registry repository exists
        run: |
          gcloud artifacts repositories describe ${{ env.AR_REPOSITORY }} \
            --location=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }} 2>/dev/null || \
          gcloud artifacts repositories create ${{ env.AR_REPOSITORY }} \
            --repository-format=docker \
            --location=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }} \
            --description="Monday.com BI Agent Docker images"

      # ── Generate image metadata ──
      - name: 🏷️ Generate image tag
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          IMAGE_TAG="${{ env.IMAGE_NAME }}:${SHORT_SHA}"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "📦 Image: ${IMAGE_TAG}"

      # ── Set up Docker Buildx for caching ──
      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Cache Docker layers ──
      - name: 💾 Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      # ── Build & Push Docker Image with cache ──
      - name: 🏗️ Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image_tag }}
            ${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # ── Move cache to avoid infinite growth ──
      - name: 🔄 Move Docker cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 3: Deploy to Cloud Run
  # ═══════════════════════════════════════════════════════════════════════════
  deploy:
    name: 🚀 Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15

    permissions:
      contents: read
      id-token: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # ── Authenticate to GCP ──
      - name: 🔐 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: ☁️ Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      # ── Deploy to Cloud Run ──
      - name: 🚀 Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          image: ${{ needs.build-and-push.outputs.image_tag }}
          region: ${{ env.GCP_REGION }}
          project_id: ${{ env.GCP_PROJECT_ID }}
          flags: |
            --platform=managed
            --allow-unauthenticated
            --port=8080
            --memory=1Gi
            --cpu=1
            --min-instances=0
            --max-instances=5
            --concurrency=80
            --timeout=300s
            --set-env-vars=PYTHONUNBUFFERED=1,PYTHONDONTWRITEBYTECODE=1
          secrets: |
            MONDAY_API_KEY=MONDAY_API_KEY:latest
            OPENAI_API_KEY=OPENAI_API_KEY:latest
            DEALS_BOARD_ID=DEALS_BOARD_ID:latest
            WORKORDERS_BOARD_ID=WORKORDERS_BOARD_ID:latest

      # ── Post-deployment Health Check ──
      - name: 🏥 Health Check
        run: |
          SERVICE_URL="${{ steps.deploy.outputs.url }}"
          echo "🌐 Service URL: ${SERVICE_URL}"

          # Wait for service to be ready
          echo "⏳ Waiting 15s for service to stabilize..."
          sleep 15

          # Health check with retries
          for i in 1 2 3 4 5; do
            echo "🔄 Health check attempt ${i}/5..."
            HTTP_STATUS=$(curl -s -o /tmp/health_response.json -w "%{http_code}" \
              "${SERVICE_URL}/api/health" \
              --max-time 10) || true

            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Health check passed!"
              cat /tmp/health_response.json | python3 -m json.tool 2>/dev/null || cat /tmp/health_response.json
              break
            else
              echo "⚠️ Health check returned HTTP ${HTTP_STATUS}"
              if [ "$i" = "5" ]; then
                echo "❌ Health check failed after 5 attempts"
                cat /tmp/health_response.json 2>/dev/null || true
                exit 1
              fi
              sleep 10
            fi
          done

      # ── Deployment Summary ──
      - name: 📋 Deployment Summary
        if: always()
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Service** | \`${{ env.SERVICE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Project** | \`${{ env.GCP_PROJECT_ID }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Region** | \`${{ env.GCP_REGION }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ needs.build-and-push.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **URL** | ${{ steps.deploy.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 4: Notify on Failure
  # ═══════════════════════════════════════════════════════════════════════════
  notify-failure:
    name: 🔔 Notify on Failure
    runs-on: ubuntu-latest
    needs: [lint-and-security, build-and-push, deploy]
    if: failure() && github.event_name == 'push'

    steps:
      - name: ❌ Post Failure Summary
        run: |
          echo "## ❌ Pipeline Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Author** | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Workflow** | [${{ github.workflow }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔧 Troubleshooting" >> $GITHUB_STEP_SUMMARY
          echo "1. Check if \`GCP_WORKLOAD_IDENTITY_PROVIDER\` and \`GCP_SERVICE_ACCOUNT\` secrets are configured" >> $GITHUB_STEP_SUMMARY
          echo "2. Verify Workload Identity Pool is set up in GCP project \`project-tai-aiinterviewer\`" >> $GITHUB_STEP_SUMMARY
          echo "3. Ensure the service account has \`roles/run.admin\` and \`roles/artifactregistry.writer\`" >> $GITHUB_STEP_SUMMARY
